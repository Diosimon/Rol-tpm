<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mis Pagos">
<title>Mis Pagos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f5f4f0; --surface: #fff; --surface2: #f0ede8;
    --border: rgba(0,0,0,0.10); --border-strong: rgba(0,0,0,0.16);
    --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e9a;
    --accent: #2d6a4f; --accent-light: #e8f5ef;
    --danger: #c0392b; --danger-light: #fdf0ee;
    --warn: #b7791f; --warn-light: #fef9ec;
    --r: 12px; --rl: 16px;
  }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 16px 14px; position: sticky; top: 0; z-index: 50; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
  .app-date { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .sync-row { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .btn-add { background: var(--accent); color: #fff; border: none; border-radius: var(--r); padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }

  .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .metric { background: var(--surface2); border-radius: var(--r); padding: 10px 12px; }
  .metric-label { font-size: 11px; color: var(--text2); }
  .metric-value { font-size: 19px; font-weight: 700; letter-spacing: -0.5px; }
  .metric-value.danger { color: var(--danger); }
  .metric-value.success { color: var(--accent); }

  .filters { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; gap: 7px; overflow-x: auto; }
  .filters::-webkit-scrollbar { display: none; }
  .chip { font-size: 13px; padding: 5px 14px; border-radius: 99px; border: 1px solid var(--border-strong); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; }
  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }

  .content { padding: 14px 14px 100px; }
  .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin: 0 4px 10px; }
  .section-label:not(:first-child) { margin-top: 18px; }

  .debt-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 13px 14px; display: flex; align-items: center; gap: 11px; margin-bottom: 8px; transition: opacity 0.25s; }
  .debt-card.paid { opacity: 0.45; }
  .debt-card.overdue { border-color: var(--danger); border-left: 3px solid var(--danger); }
  .debt-card.soon { border-color: var(--warn); border-left: 3px solid var(--warn); }

  .check-btn { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border-strong); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; color: transparent; transition: all 0.15s; }
  .check-btn:active { transform: scale(0.9); }
  .debt-card.paid .check-btn { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .type-icon { width: 36px; height: 36px; border-radius: var(--r); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .debt-info { flex: 1; min-width: 0; }
  .debt-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .debt-card.paid .debt-name { text-decoration: line-through; color: var(--text3); }
  .debt-meta { font-size: 12px; color: var(--text2); margin-top: 3px; display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-warn { background: var(--warn-light); color: var(--warn); }
  .badge-gray { background: var(--surface2); color: var(--text2); }
  .debt-amount { font-size: 15px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.3px; }
  .debt-card.paid .debt-amount { color: var(--text3); }
  .card-actions { display: flex; flex-direction: column; gap: 3px; }
  .icon-btn { width: 28px; height: 28px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: var(--text3); }
  .icon-btn:active { background: var(--surface2); }

  .empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(45,106,79,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--rl) var(--rl) 0 0; padding: 20px 20px 36px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: var(--border-strong); border-radius: 99px; margin: 0 auto 18px; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 11px 13px; border: 1px solid var(--border-strong); border-radius: var(--r); font-size: 16px; background: var(--bg); color: var(--text); outline: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .note { font-size: 12px; color: var(--text2); background: var(--surface2); border-radius: var(--r); padding: 9px 12px; margin-top: 6px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-cancel { flex: 1; padding: 12px; border: 1px solid var(--border-strong); border-radius: var(--r); background: transparent; font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; }
  .btn-save { flex: 2; padding: 12px; border: none; border-radius: var(--r); background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }

  /* LOADING */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; gap: 12px; color: var(--text2); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">💳 Mis Pagos</div>
      <div class="app-date" id="date-label"></div>
      <div class="sync-row" id="sync-status"></div>
    </div>
    <button class="btn-add" onclick="openModal()">+ Agregar</button>
  </div>
  <div class="summary">
    <div class="metric"><div class="metric-label">Por pagar</div><div class="metric-value danger" id="total-pending">$0</div></div>
    <div class="metric"><div class="metric-label">Pagado</div><div class="metric-value success" id="total-paid">$0</div></div>
    <div class="metric"><div class="metric-label">Deudas</div><div class="metric-value" id="total-count">0</div></div>
  </div>
</div>

<div class="filters">
  <button class="chip active" onclick="setFilter('todas',this)">Todas</button>
  <button class="chip" onclick="setFilter('pendiente',this)">Pendientes</button>
  <button class="chip" onclick="setFilter('vence-pronto',this)">Vence pronto</button>
  <button class="chip" onclick="setFilter('vencida',this)">Vencidas</button>
  <button class="chip" onclick="setFilter('pagada',this)">Pagadas</button>
</div>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div>Cargando pagos...</div>
</div>

<div class="overlay" id="overlay" onclick="closeIfBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title">Nueva deuda / pago</h3>
    <div class="field"><label>Nombre</label><input type="text" id="f-name" placeholder="ej. TDC Banamex, Netflix..." /></div>
    <div class="field"><label>Monto (MXN)</label><input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal" /></div>
    <div class="field"><label>Día de pago (del mes)</label><input type="number" id="f-day" placeholder="ej. 15" min="1" max="31" inputmode="numeric" /></div>
    <div class="field"><label>Tipo</label>
      <select id="f-type">
        <option value="TDC">💳 Tarjeta de crédito</option>
        <option value="Servicio">⚡ Servicio (luz, agua...)</option>
        <option value="Suscripción">🔄 Suscripción</option>
        <option value="Préstamo">💰 Préstamo / crédito</option>
        <option value="Otro">📄 Otro</option>
      </select>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:11px 13px; background:var(--surface2); border-radius:var(--r); margin-top:4px;">
      <input type="checkbox" id="f-unico" style="width:18px; height:18px; accent-color:var(--accent); cursor:pointer; flex-shrink:0;" />
      <label for="f-unico" style="font-size:13px; color:var(--text2); cursor:pointer; line-height:1.4;">
        <strong style="color:var(--text);">Pago único</strong> — se elimina al marcarlo como pagado
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveDebt()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbysTWCsJprHeWErXsOlsU951ldWGRsLI92FswaensVTjsdCLeoxHunE0fiBOL6nc4s/exec';

let debts = [], payments = {}, currentFilter = 'todas', editingId = null;

const today = new Date();
const thisMonth = today.getMonth(), thisYear = today.getFullYear();
const nextMonth = thisMonth === 11 ? 0 : thisMonth + 1;
const nextYear = thisMonth === 11 ? thisYear + 1 : thisYear;
const monthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const typeIcons = { TDC:'💳', Servicio:'⚡', Suscripción:'🔄', Préstamo:'💰', Otro:'📄' };

document.getElementById('date-label').textContent = monthNames[thisMonth] + ' de ' + thisYear;

function showStatus(msg, color) {
  const el = document.getElementById('sync-status');
  el.textContent = msg; el.style.color = color || '#6b6b67';
  if (msg) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
}

async function load() {
  showStatus('Cargando...', '#6b6b67');
  try {
    const res = await fetch(SHEETS_URL + '?t=' + Date.now());
    const text = await res.text();
    const data = text && text !== '{}' ? JSON.parse(text) : null;
    if (data && data.debts && data.debts.length > 0) {
      debts = data.debts; payments = data.payments || {};
      showStatus('✓ Sincronizado', '#2d6a4f');
    } else {
      showStatus('Sin datos aún', '#6b6b67');
    }
  } catch(e) {
    showStatus('⚠ Sin conexión', '#b7791f');
  }
  render();
}

async function save() {
  const data = { debts, payments };
  try {
    showStatus('Guardando...', '#6b6b67');
    await fetch(SHEETS_URL, { method: 'POST', body: JSON.stringify(data) });
    showStatus('✓ Guardado', '#2d6a4f');
  } catch(e) {
    showStatus('⚠ Error al guardar', '#c0392b');
  }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function payKey(id, y, m) { return id + '_' + y + '_' + m; }
function isPaid(id, y, m) { return !!payments[payKey(id, y, m)]; }

function togglePaid(id, y, m) {
  const k = payKey(id, y, m);
  if (payments[k]) {
    delete payments[k];
  } else {
    payments[k] = true;
    const debt = debts.find(d => d.id === id);
    if (debt && debt.unico) {
      setTimeout(() => {
        if (confirm('"' + debt.name + '" es pago único. ¿Eliminarlo de la lista?')) {
          debts = debts.filter(d => d.id !== id);
          Object.keys(payments).forEach(pk => { if (pk.startsWith(id + '_')) delete payments[pk]; });
          save(); render(); return;
        }
        save(); render();
      }, 300);
      return;
    }
  }
  save(); render();
}

function getStatus(debt) {
  if (isPaid(debt.id, thisYear, thisMonth)) return 'pagada';
  const target = new Date(thisYear, thisMonth, debt.day);
  const diff = Math.ceil((target - today) / 86400000);
  if (diff < 0) return 'vencida';
  if (diff <= 5) return 'vence-pronto';
  return 'pendiente';
}

function matches(d) { return currentFilter === 'todas' || getStatus(d) === currentFilter; }
function setFilter(f, el) { currentFilter = f; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); render(); }
function fmt(n) { return '$' + n.toLocaleString('es-MX', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function render() {
  const thisDebts = debts.filter(d => matches(d)).sort((a,b) => a.day - b.day);
  const showNext = currentFilter === 'todas' || currentFilter === 'pendiente';
  const nextDebts = showNext ? debts.filter(d => !d.unico && !isPaid(d.id, nextYear, nextMonth)).sort((a,b) => a.day - b.day) : [];

  let html = '';
  if (thisDebts.length) {
    html += '<div class="section-label">Este mes</div>';
    html += thisDebts.map(d => cardHTML(d, thisYear, thisMonth, false)).join('');
  } else {
    html += '<div class="section-label">Este mes</div><div class="empty">Sin resultados</div>';
  }
  if (showNext) {
    html += '<div class="section-label">Próximo mes</div>';
    html += nextDebts.length ? nextDebts.map(d => cardHTML(d, nextYear, nextMonth, true)).join('') : '<div class="empty">—</div>';
  }

  document.getElementById('content').innerHTML = html || '<div class="empty">Agrega tu primera deuda con el botón +</div>';

  let pending = 0, paid = 0;
  debts.forEach(d => { if (isPaid(d.id, thisYear, thisMonth)) paid += d.amount; else pending += d.amount; });
  document.getElementById('total-pending').textContent = fmt(pending);
  document.getElementById('total-paid').textContent = fmt(paid);
  document.getElementById('total-count').textContent = debts.length;
}

function cardHTML(debt, y, m, isNext) {
  const paid = isPaid(debt.id, y, m);
  const status = isNext ? 'pendiente' : getStatus(debt);
  let badge = '';
  if (!paid && !isNext) {
    if (status === 'vencida') badge = '<span class="badge badge-danger">Vencida</span>';
    else if (status === 'vence-pronto') {
      const d = Math.max(0, Math.ceil((new Date(thisYear, thisMonth, debt.day) - today) / 86400000));
      badge = `<span class="badge badge-warn">Vence en ${d} día${d===1?'':'s'}</span>`;
    }
  }
  const cls = paid ? 'paid' : (status === 'vencida' ? 'overdue' : (status === 'vence-pronto' ? 'soon' : ''));
  return `<div class="debt-card ${cls}">
    <button class="check-btn" onclick="togglePaid('${debt.id}',${y},${m})">✓</button>
    <div class="type-icon">${typeIcons[debt.type]||'📄'}</div>
    <div class="debt-info">
      <div class="debt-name">${debt.name}</div>
      <div class="debt-meta">
        <span>📅 Día ${debt.day}</span>
        <span class="badge badge-gray">${debt.type}</span>
        ${debt.unico ? '<span class="badge" style="background:#f0e6ff;color:#7c3aed;">Único</span>' : ''}
        ${badge}
      </div>
    </div>
    <div class="debt-amount">${fmt(debt.amount)}</div>
    <div class="card-actions">
      <button class="icon-btn" onclick="editDebt('${debt.id}')">✏️</button>
      <button class="icon-btn" onclick="deleteDebt('${debt.id}')">🗑️</button>
    </div>
  </div>`;
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Editar deuda' : 'Nueva deuda / pago';
  if (id) {
    const d = debts.find(x => x.id === id);
    document.getElementById('f-name').value = d.name;
    document.getElementById('f-amount').value = d.amount;
    document.getElementById('f-day').value = d.day;
    document.getElementById('f-type').value = d.type;
    document.getElementById('f-unico').checked = !!d.unico;
  } else {
    ['f-name','f-amount','f-day'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-type').value = 'TDC';
    document.getElementById('f-unico').checked = false;
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeIfBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function saveDebt() {
  const name = document.getElementById('f-name').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const day = parseInt(document.getElementById('f-day').value);
  const type = document.getElementById('f-type').value;
  const unico = document.getElementById('f-unico').checked;
  if (!name || !amount || !day || day < 1 || day > 31) { alert('Por favor completa todos los campos.'); return; }
  if (editingId) {
    const i = debts.findIndex(x => x.id === editingId);
    debts[i] = { ...debts[i], name, amount, day, type, unico };
  } else {
    debts.push({ id: uid(), name, amount, day, type, unico });
  }
  save(); closeModal(); render();
}

function editDebt(id) { openModal(id); }
function deleteDebt(id) {
  if (!confirm('¿Eliminar esta deuda?')) return;
  debts = debts.filter(d => d.id !== id);
  Object.keys(payments).forEach(k => { if (k.startsWith(id + '_')) delete payments[k]; });
  save(); render();
}

load();
</script>
</body>
</html>
